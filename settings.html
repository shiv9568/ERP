<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settings - Edit Profile</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .settings-container {
      background: #fff;
      margin: 15px;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .settings-title {
      color: #29b6f6;
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .form-group input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .save-btn {
      background: #29b6f6;
      color: white;
      border: none;
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .save-btn:hover {
      background: #03a9f4;
    }
  </style>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

  <!-- A. HEADER -->
  <header class="header">
    <div class="brand">
      <img src="logo.png" alt="Graphic Era Logo" class="brand-logo">
      <div class="brand-separator"></div>
      <div class="brand-text">
        <div class="brand-title"><span style="color:#d52924;">Graphic</span> <span style="color:#333;">Era</span></div>
        <div class="brand-subtitle">Deemed to be University</div>
      </div>
    </div>
  </header>

  <div class="settings-container">
    <div class="settings-title">Edit Identity</div>
    
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="inp-name" placeholder="KRISHNA BATRA">
    </div>
    
    <div class="form-group">
      <label>Profile Image (URL or take photo Base64)</label>
      <!-- Using file input to allow picking a photo from the phone -->
      <input type="file" id="inp-avatar-file" accept="image/*" style="border:none; padding:0;">
      <small style="color:#888; margin-top:5px;">Select an image to change avatar</small>
    </div>

    <!-- Hidden input to hold the avatar string -->
    <input type="hidden" id="inp-avatar">
    
    <div class="form-group">
      <label>Roll Number (for profile)</label>
      <input type="text" id="inp-rollNo">
    </div>

    <div class="form-group">
      <label>Personal Email</label>
      <input type="email" id="inp-email">
    </div>

    <div class="form-group">
      <label>Phone No</label>
      <input type="text" id="inp-phone">
    </div>

    <div class="form-group">
      <label>Father's Name</label>
      <input type="text" id="inp-fatherName">
    </div>
    
    <div class="form-group">
      <label>Mother's Name</label>
      <input type="text" id="inp-motherName">
    </div>

    <div class="form-group">
      <label>D.O.B.</label>
      <input type="text" id="inp-dob">
    </div>

    <div class="form-group">
      <label>Official Email</label>
      <input type="email" id="inp-officialEmail">
    </div>

    <div class="form-group">
      <label>Course (Full Name)</label>
      <input type="text" id="inp-course" placeholder="BACHELOR OF BUSINESS ADMIN...">
    </div>

    <div class="form-group">
      <label>Course (Short Format for ID card)</label>
      <input type="text" id="inp-courseCard" placeholder="BBA">
    </div>
    
    <div class="form-group">
      <label>Year / Sem</label>
      <input type="text" id="inp-year">
    </div>

    <div class="form-group">
      <label>Section</label>
      <input type="text" id="inp-section">
    </div>

    <div class="form-group">
      <label>Class Roll No</label>
      <input type="text" id="inp-classRoll">
    </div>

    <div class="form-group">
      <label>Enrollment No</label>
      <input type="text" id="inp-enrollNo">
    </div>

    <div class="form-group">
      <label>University Roll No</label>
      <input type="text" id="inp-uniRoll">
    </div>

    <div class="form-group">
      <label>HighSchool %</label>
      <input type="text" id="inp-highSchool">
    </div>

    <div class="form-group">
      <label>Intermediate %</label>
      <input type="text" id="inp-intermediate">
    </div>

    <div class="form-group">
      <label>Status</label>
      <input type="text" id="inp-status">
    </div>
    
    <div class="form-group">
      <label>Batch (ID Card)</label>
      <input type="text" id="inp-batch">
    </div>

    <div style="border-top: 2px solid #29b6f6; margin: 15px 0 10px; padding-top: 10px;">
      <div style="font-size:13px; font-weight:bold; color:#29b6f6; margin-bottom:12px;">📋 ID Card Back Panel</div>
    </div>

    <div class="form-group">
      <label>Contact No.</label>
      <input type="text" id="inp-contactNo" placeholder="9xxxxxxxxx">
    </div>

    <div class="form-group">
      <label>Blood Group</label>
      <input type="text" id="inp-bloodGroup" placeholder="A+ve, B+ve...">
    </div>

    <div class="form-group">
      <label>Residential Address</label>
      <input type="text" id="inp-resiAddress" placeholder="House No, Area, City, State, PIN">
    </div>

    <div class="form-group">
      <label>Valid Through (ID Expiry)</label>
      <input type="text" id="inp-validThrough" placeholder="30-06-2025">
    </div>

    <div class="form-group">
      <label>Emergency Contact No.</label>
      <input type="text" id="inp-emergencyContact" placeholder="7xxxxxxxxx">
    </div>

    <button class="save-btn" onclick="saveSettings()">Save Identity</button>
  </div>
  
  <br><br><br>

  <!-- F. BOTTOM NAVBAR -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="material-symbols-outlined">home</span>
      <span>Home</span>
    </a>
    <a href="index.html" class="nav-item">
      <span class="material-symbols-outlined">bar_chart</span>
      <span>Dashboard</span>
    </a>
    <a href="settings.html" class="nav-item active">
      <span class="material-symbols-outlined">settings</span>
      <span>Settings</span>
    </a>
  </nav>

  <script src="script.js"></script>
  <script>
    // Load data into inputs
    document.addEventListener('DOMContentLoaded', () => {
      const data = getUserData();
      for (const key in data) {
        const inp = document.getElementById(`inp-${key}`);
        if(inp) inp.value = data[key];
      }
    });

    // Handle Image file picking and converting to base64 for localStorage
    const avatarFileInp = document.getElementById('inp-avatar-file');
    avatarFileInp.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        document.getElementById('inp-avatar').value = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    function saveSettings() {
      const data = getUserData();
      for (const key in data) {
        const inp = document.getElementById(`inp-${key}`);
        if(inp) {
          data[key] = inp.value;
        }
      }
      saveUserData(data);
      alert("Identity saved successfully!\nThis is only saved on this device.");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
